name: Build
on:
  push:
    branches:
      - develop
    paths:
      - .github/workflows/build.yaml
      - .github/docs/build-details.md
      - ci/**
      - luajit_linux_macos.sh
      - osci-render.jucer
      - sosci.jucer
      - packaging/osci-render.iss
      - packaging/sosci.iss
      - packaging/osci-render.pkgproj
      - packaging/sosci.pkgproj
  workflow_dispatch:

# Cancel in-progress runs for the same ref + event when a new run starts.
# Saves runner minutes when CI is triggered repeatedly in quick succession.
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.project }} ${{ matrix.version }} @ ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-2022]
        project: [osci-render, sosci]
        version: [free, premium]
        exclude:
          - project: sosci
            version: free
    steps:
      - name: Fix up git URLs
        run: echo -e '[url "https://github.com/"]\n  insteadOf = "git@github.com:"' >> ~/.gitconfig
        shell: bash

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN || github.token }}
          submodules: recursive
          fetch-depth: 0

      # ── Caches ────────────────────────────────────────────────
      # ccache: compile-time cache for Projucer-generated builds. Wired into
      # macOS Xcode configs (CC=ccache-clang) and into the Linux Makefile via
      # the CXX="ccache g++" override in ci/build.sh and ci/test.sh.
      - name: Set up ccache
        if: matrix.os != 'windows-2022'
        # Pinned to upstream v1.2.
        uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639
        with:
          key: ccache-${{ matrix.os }}-${{ matrix.project }}-${{ matrix.version }}
          # Allow restoring from any matching key on the same OS/project even if
          # the variant differs (large overlap between free/premium and effect/instrument).
          restore-keys: |
            ccache-${{ matrix.os }}-${{ matrix.project }}-
          max-size: 2G

      # sccache: compile-time cache for Windows MSVC builds. ci/setup-env.sh
      # creates a fake cl.exe wrapper and ci/build.sh / ci/test.sh pass it to
      # MSBuild via CLToolExe/CLToolPath.
      - name: Set up sccache (Windows)
        if: matrix.os == 'windows-2022'
        # Pinned to upstream v0.14.0.
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696
        with:
          version: "v0.14.0"

      # LuaJIT is built from source by ci/test.sh and by the Projucer-generated
      # build (linked statically). Cache outputs by runner image, submodule SHA,
      # and the build script so SDK/toolchain or recipe changes force a rebuild.
      - name: Resolve submodule SHAs for cache keys
        id: submodule_shas
        shell: bash
        run: |
          echo "luajit_sha=$(git -C modules/LuaJIT rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "pluginval_sha=$(git -C modules/pluginval rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "image_os=${ImageOS:-unknown}" >> "$GITHUB_OUTPUT"
          echo "image_version=${ImageVersion:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Cache LuaJIT build
        id: cache_luajit
        uses: actions/cache@v4
        with:
          key: luajit-${{ matrix.os }}-${{ runner.arch }}-${{ steps.submodule_shas.outputs.image_os }}-${{ steps.submodule_shas.outputs.image_version }}-${{ steps.submodule_shas.outputs.luajit_sha }}-${{ hashFiles('luajit_linux_macos.sh', 'ci/test.sh') }}
          path: |
            modules/LuaJIT/src/libluajit.a
            modules/LuaJIT/src/lua51.lib
            modules/LuaJIT/src/luajit51.lib
            modules/LuaJIT/src/lua51.dll
            modules/LuaJIT/src/lua51.exp
            modules/LuaJIT/src/luajit.exe
            modules/LuaJIT/src/libluajit_x86_64.a
            modules/LuaJIT/src/libluajit_arm64.a
            modules/LuaJIT/src/.luajit-build-x86_64.stamp
            modules/LuaJIT/src/.luajit-build-arm64.stamp
            modules/LuaJIT/src/.luajit-build-linux.stamp

      # Cache the entire pluginval Builds/ directory by runner image, submodule
      # SHA, and build recipe so toolchain or script changes force a rebuild.
      - name: Cache pluginval build
        id: cache_pluginval
        uses: actions/cache@v4
        with:
          key: pluginval-${{ matrix.os }}-${{ runner.arch }}-${{ steps.submodule_shas.outputs.image_os }}-${{ steps.submodule_shas.outputs.image_version }}-${{ steps.submodule_shas.outputs.pluginval_sha }}-${{ hashFiles('ci/pluginval.sh', '.github/workflows/build.yaml') }}
          path: |
            modules/pluginval/Builds

      # Cache the Packages installer .dmg between macOS runs (~60MB download).
      - name: Cache Packages installer image (macOS)
        id: cache_packages
        if: matrix.os == 'macos-latest'
        uses: actions/cache@v4
        with:
          key: packages-installer-1211
          path: Packages_1211_dev.dmg

      # apt packages: heavy install on every Linux run. cache-apt-pkgs-action
      # restores .deb archives from cache when available.
      - name: Cache apt packages (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        # Pinned to upstream v1.6.0.
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05
        with:
          packages: ccache ninja-build clang git ladspa-sdk freeglut3-dev g++ libasound2-dev libcurl4-openssl-dev libfreetype6-dev libjack-jackd2-dev libx11-dev libxcomposite-dev libxcursor-dev libxinerama-dev libxrandr-dev mesa-common-dev webkit2gtk-4.0 juce-tools xvfb
          version: 1.0

      # NuGet packages restored by MSBuild on every Windows run.
      - name: Cache NuGet packages (Windows)
        if: matrix.os == 'windows-2022'
        uses: actions/cache@v4
        with:
          key: nuget-${{ runner.os }}-${{ hashFiles('*.jucer') }}
          restore-keys: |
            nuget-${{ runner.os }}-
          path: ~/.nuget/packages

      - name: Set platform variables
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == ubuntu* ]]; then
            echo "OS=linux" >> $GITHUB_ENV
            echo "OS_ARTIFACT=linux" >> $GITHUB_ENV
          elif [[ "${{ matrix.os }}" == macos* ]]; then
            echo "OS=mac" >> $GITHUB_ENV
            echo "OS_ARTIFACT=macos" >> $GITHUB_ENV
          else
            echo "OS=win" >> $GITHUB_ENV
            echo "OS_ARTIFACT=windows" >> $GITHUB_ENV
          fi

          # sosci has only one variant; omit the version suffix from its artifact names
          if [[ "${{ matrix.project }}" == "sosci" ]]; then
            echo "OUTPUT_NAME=${{ matrix.project }}" >> $GITHUB_ENV
          else
            echo "OUTPUT_NAME=${{ matrix.project }}-${{ matrix.version }}" >> $GITHUB_ENV
          fi

      - name: Extract project version
        id: version
        shell: bash
        run: |
          python3 ci/extract_version.py "${{ matrix.project }}.jucer" > version.txt
          PROJECT_VERSION=$(cat version.txt)
          echo "version=$PROJECT_VERSION" >> $GITHUB_OUTPUT
          echo "Using project version: $PROJECT_VERSION"

      # macOS specific: setup Xcode and import certificates (skipped in EARLY_MEGA_TEST)
      - uses: maxim-lobanov/setup-xcode@v1
        if: matrix.os == 'macos-latest'
        with:
          xcode-version: latest

      - name: Import application certificates
        if: matrix.os == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v3
        with:
          keychain: oscirender
          keychain-password: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          p12-file-base64: ${{ secrets.APPLE_APPLICATION_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_APPLICATION_CERTIFICATE_PASSWORD }}

      - name: Import installer certificates
        if: matrix.os == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v3
        with:
          keychain: oscirender
          keychain-password: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          p12-file-base64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
          create-keychain: false

      # Windows specific: NuGet setup
      - name: Setup NuGet.exe for use with actions
        if: matrix.os == 'windows-2022'
        uses: NuGet/setup-nuget@v1.0.5

      - name: NuGet Sources
        if: matrix.os == 'windows-2022'
        run: nuget sources

      - name: Check commit message for skip-validation marker
        id: ci_flags
        shell: bash
        run: |
          MSG=$(git log -1 --pretty=%B || true)
          if [[ "$MSG" == *"[skip-validation]"* ]]; then
            echo "skip_validation=true" >> "$GITHUB_OUTPUT"
            echo "Commit requests skip-validation: tests + pluginval will be skipped."
          else
            echo "skip_validation=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run unit tests
        if: steps.ci_flags.outputs.skip_validation != 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCCACHE_GHA_ENABLED: "true"
        run: |
          source ./ci/setup-env.sh
          source ./ci/test.sh

      - name: Run build
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCCACHE_GHA_ENABLED: "true"
        run: |
          source ./ci/setup-env.sh
          source ./ci/build.sh "${{ matrix.project }}" "${{ matrix.version }}"

      # Install MEGAcmd early so both pluginval-log and binary uploads can use it
      - name: Install MEGAcmd (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            wget -q https://mega.nz/linux/repo/xUbuntu_24.04/amd64/megacmd-xUbuntu_24.04_amd64.deb
            sudo apt-get update -y >/dev/null
            sudo apt-get install -y ./megacmd-xUbuntu_24.04_amd64.deb >/dev/null
          else
            brew install --cask megacmd
            echo "/Applications/MEGAcmd.app/Contents/MacOS" >> $GITHUB_PATH
          fi

      - name: Install MEGAcmd (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          choco install megacmd -y --no-progress
          # Find where MEGAcmd was installed
          $megaDir = if (Test-Path "$env:LOCALAPPDATA\MEGAcmd") { "$env:LOCALAPPDATA\MEGAcmd" }
                     elseif (Test-Path "C:\Users\runneradmin\AppData\Local\MEGAcmd") { "C:\Users\runneradmin\AppData\Local\MEGAcmd" }
                     else { (Get-Command mega-login -ErrorAction SilentlyContinue).Source | Split-Path }
          if (-not $megaDir -or -not (Test-Path $megaDir)) {
            Write-Error "MEGAcmd installation not found. Checked LOCALAPPDATA, hardcoded path, and PATH."
            exit 1
          }
          Write-Host "MEGAcmd directory: $megaDir"
          Write-Host "Contents: $(Get-ChildItem $megaDir -Name -ErrorAction SilentlyContinue)"
          echo $megaDir | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install procdump (Windows)
        if: matrix.os == 'windows-2022'
        shell: bash
        run: |
          choco install procdump -y --no-progress
          procdump -accepteula || true

      # Build pluginval once, then run effect + instrument validation in
      # parallel within the same runner. continue-on-error keeps the rest of the
      # job alive even on validation failure; the `Check pluginval results` step
      # at the end fails the job if either failed.
      - name: Validate plugin with pluginval (effect + instrument in parallel)
        id: pluginval
        if: steps.ci_flags.outputs.skip_validation != 'true'
        continue-on-error: true
        shell: bash
        env:
          PLUGINVAL_SKIP_GUI: "1"
          PLUGINVAL_TIMEOUT: "1200000"
        run: |
          set +e
          mkdir -p bin/pluginval-logs

          PLUGINVAL_BUILD_LOG=bin/pluginval-logs/pluginval-build.log
          PLUGINVAL_BUILD_ONLY=1 \
            bash ./ci/pluginval.sh "${{ matrix.project }}" \
            > "$PLUGINVAL_BUILD_LOG" 2>&1
          BUILD_EXIT=$?

          if [ "$BUILD_EXIT" -ne 0 ]; then
            echo "$BUILD_EXIT" > bin/pluginval-logs/pluginval-effect.exitcode
            if [ "${{ matrix.project }}" = "osci-render" ]; then
              echo "$BUILD_EXIT" > bin/pluginval-logs/pluginval-instrument.exitcode
            fi
          else
            # Effect run (strictness 10)
            (
              PLUGINVAL_STRICTNESS=10 \
                PLUGINVAL_LOG_NAME=effect \
                bash ./ci/pluginval.sh "${{ matrix.project }}" \
                > bin/pluginval-logs/pluginval-effect.log 2>&1
              echo $? > bin/pluginval-logs/pluginval-effect.exitcode
            ) &
            PID_EFFECT=$!

            # Instrument run (osci-render only, strictness 5)
            PID_INSTRUMENT=
            if [ "${{ matrix.project }}" = "osci-render" ]; then
              (
                PLUGINVAL_STRICTNESS=5 \
                  PLUGINVAL_LOG_NAME=instrument \
                  bash ./ci/pluginval.sh "${{ matrix.project }}" "${{ matrix.project }}-instrument" \
                  > bin/pluginval-logs/pluginval-instrument.log 2>&1
                echo $? > bin/pluginval-logs/pluginval-instrument.exitcode
              ) &
              PID_INSTRUMENT=$!
            fi

            wait "$PID_EFFECT"
            if [ -n "$PID_INSTRUMENT" ]; then wait "$PID_INSTRUMENT"; fi
          fi

          # Stream logs into the workflow output for visibility.
          echo "===== pluginval build log ====="
          cat "$PLUGINVAL_BUILD_LOG" || true
          echo "===== pluginval (effect) log ====="
          cat bin/pluginval-logs/pluginval-effect.log || true
          if [ -f bin/pluginval-logs/pluginval-instrument.log ]; then
            echo "===== pluginval (instrument) log ====="
            cat bin/pluginval-logs/pluginval-instrument.log || true
          fi

          EFFECT_EXIT=$(cat bin/pluginval-logs/pluginval-effect.exitcode 2>/dev/null || echo 1)
          INSTRUMENT_EXIT=0
          if [ "${{ matrix.project }}" = "osci-render" ]; then
            INSTRUMENT_EXIT=$(cat bin/pluginval-logs/pluginval-instrument.exitcode 2>/dev/null || echo 1)
          fi

          echo "effect_exit=$EFFECT_EXIT" >> "$GITHUB_OUTPUT"
          echo "instrument_exit=$INSTRUMENT_EXIT" >> "$GITHUB_OUTPUT"

          # Don't fail this step — `Check pluginval results` decides job outcome.
          exit 0

      # Upload pluginval logs and crash dumps to MEGA (runs even if pluginval failed)
      - name: Upload pluginval logs to MEGA (Unix)
        if: always() && runner.os != 'Windows' && hashFiles('bin/pluginval-logs/**') != ''
        shell: bash
        run: |
          set -euo pipefail
          mega-login "${{ secrets.MEGA_USERNAME }}" "${{ secrets.MEGA_PASSWORD }}" || true
          DEST="/${{ matrix.project }}/${{ steps.version.outputs.version }}/pluginval-logs/${{ env.OS_ARTIFACT }}"
          find bin/pluginval-logs -type f -size +0c -print0 2>/dev/null | while IFS= read -r -d '' f; do
            echo "Uploading $f -> $DEST"
            mega-put -c "$f" "$DEST/" || echo "WARNING: failed to upload $f"
          done
          mega-logout || true

      - name: Upload pluginval logs to MEGA (Windows)
        if: always() && runner.os == 'Windows' && hashFiles('bin/pluginval-logs/**') != ''
        shell: powershell
        run: |
          $ErrorActionPreference = 'Continue'
          # Ensure MEGAcmd is on PATH
          if (-not (Get-Command mega-login -ErrorAction SilentlyContinue)) {
            $p = "$env:LOCALAPPDATA\MEGAcmd"
            if (Test-Path $p) { $env:PATH = "$p;$env:PATH" }
          }
          mega-login "${{ secrets.MEGA_USERNAME }}" "${{ secrets.MEGA_PASSWORD }}"
          $dest = "/${{ matrix.project }}/${{ steps.version.outputs.version }}/pluginval-logs/${{ env.OS_ARTIFACT }}"
          $logDir = "bin/pluginval-logs"
          if (Test-Path $logDir) {
            Get-ChildItem $logDir -File -Recurse | Where-Object { $_.Length -gt 0 } | ForEach-Object {
              Write-Host "Uploading $($_.FullName) -> $dest"
              mega-put -c $_.FullName $dest/
            }
          }
          mega-logout

      # macOS packaging & notarization
      - name: Download Packages installer build tool
        if: matrix.os == 'macos-latest' && steps.cache_packages.outputs.cache-hit != 'true'
        run: wget http://s.sudre.free.fr/files/Packages_1211_dev.dmg

      - name: Mount Packages image
        if: matrix.os == 'macos-latest'
        run: hdiutil attach Packages_1211_dev.dmg

      - name: Install Packages
        if: matrix.os == 'macos-latest'
        run: sudo installer -pkg /Volumes/Packages\ 1.2.11/Install\ Packages.pkg -target /

      - name: Build installer (macOS pkg)
        if: matrix.os == 'macos-latest'
        run: packagesbuild --project "packaging/${{ matrix.project }}.pkgproj"

      - name: Sign installer (macOS pkg)
        if: matrix.os == 'macos-latest'
        run: |
          productsign -s "${{ secrets.APPLE_DEVELOPER_ID_INSTALLER }}" "packaging/build/${{ matrix.project }}.pkg" "bin/${{ env.OUTPUT_NAME }}-mac.pkg"
          pkgutil --check-signature "bin/${{ env.OUTPUT_NAME }}-mac.pkg"

      - name: Notarize installer (macOS)
        if: matrix.os == 'macos-latest'
        uses: lando/notarize-action@v2
        with:
          product-path: "bin/${{ env.OUTPUT_NAME }}-mac.pkg"
          appstore-connect-username: ${{ secrets.APPLE_ID }}
          appstore-connect-password: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          appstore-connect-team-id: ${{ secrets.APPLE_TEAM_ID }}
          primary-bundle-id: com.${{ matrix.project }}.pkg
          tool: notarytool
          verbose: true

      - name: Staple installer (macOS)
        if: matrix.os == 'macos-latest'
        run: xcrun stapler staple "bin/${{ env.OUTPUT_NAME }}-mac.pkg"

      - name: Check installer (macOS)
        if: matrix.os == 'macos-latest'
        run: spctl -a -vvv -t install "bin/${{ env.OUTPUT_NAME }}-mac.pkg"

      # Windows packaging (Inno Setup)
      - name: Compile .ISS to .EXE Installer
        if: matrix.os == 'windows-2022'
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: "packaging/${{ matrix.project }}.iss"

      - name: Package Windows installer as zip
        if: matrix.os == 'windows-2022'
        shell: bash
        run: |
          # Move the installer .exe into bin/ under the canonical OUTPUT_NAME,
          # then zip it as ${OUTPUT_NAME}-windows.zip so users get a single, clearly
          # named download matching the other platforms.
          mv "packaging/build/${{ matrix.project }}.exe" "bin/${OUTPUT_NAME}.exe"
          cd bin
          7z a "${OUTPUT_NAME}-windows.zip" "${OUTPUT_NAME}.exe"
          rm -f "${OUTPUT_NAME}.exe"

      # Combined MEGA upload (Unix)
      - name: Upload binaries to MEGA (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mega-login "${{ secrets.MEGA_USERNAME }}" "${{ secrets.MEGA_PASSWORD }}"
          # sosci has no free/premium variants, so upload flat under the version dir
          if [[ "${{ matrix.project }}" == "sosci" ]]; then
            DEST="/${{ matrix.project }}/${{ steps.version.outputs.version }}"
          else
            DEST="/${{ matrix.project }}/${{ steps.version.outputs.version }}/${{ matrix.version }}"
          fi
          ls -1 bin || true
          # Upload all produced artifacts (files only) into variant subdirectory
          shopt -s nullglob
          for f in bin/*; do
            if [[ -f "$f" ]]; then
              echo "Uploading $f -> $DEST"
              mega-put -c "$f" "$DEST/"
            fi
          done
          mega-logout

      # Combined MEGA upload (Windows)
      - name: Upload binaries to MEGA (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          # Ensure MEGAcmd is on PATH
          if (-not (Get-Command mega-login -ErrorAction SilentlyContinue)) {
            $p = "$env:LOCALAPPDATA\MEGAcmd"
            if (Test-Path $p) { $env:PATH = "$p;$env:PATH" }
          }
          mega-login "${{ secrets.MEGA_USERNAME }}" "${{ secrets.MEGA_PASSWORD }}"
          $root = "/${{ matrix.project }}/${{ steps.version.outputs.version }}"
          # sosci has no free/premium variants, so upload flat under the version dir
          if ('${{ matrix.project }}' -eq 'sosci') {
            $variant = $root
          } else {
            $variant = "$root/${{ matrix.version }}"
          }
          Get-ChildItem bin -File | ForEach-Object {
            if ($_.Extension -eq '.pdb') {
              Write-Host "Uploading $($_.FullName) -> $root (debug info)"
              mega-put -c $_.FullName $root/
            } else {
              Write-Host "Uploading $($_.FullName) -> $variant"
              mega-put -c $_.FullName $variant/
            }
          }
          mega-logout

      # Fail the job if pluginval failed (after all logs and binaries have been uploaded)
      - name: Check pluginval results
        if: always() && steps.ci_flags.outputs.skip_validation != 'true'
        shell: bash
        run: |
          FAILED=0
          if [ "${{ steps.pluginval.outcome }}" = "skipped" ]; then
            echo "pluginval step was skipped; preserving earlier job result."
            exit 0
          fi
          if [ "${{ steps.pluginval.outcome }}" = "failure" ]; then
            echo "::error::pluginval step failed before publishing complete outputs"
            FAILED=1
          fi
          EFFECT_EXIT="${{ steps.pluginval.outputs.effect_exit }}"
          INSTRUMENT_EXIT="${{ steps.pluginval.outputs.instrument_exit }}"
          if [ -z "$EFFECT_EXIT" ]; then
            echo "::error::pluginval (effect) did not publish an exit code"
            FAILED=1
          elif [ "$EFFECT_EXIT" != "0" ]; then
            echo "::error::pluginval (effect) failed with exit code $EFFECT_EXIT"
            FAILED=1
          fi
          if [ -z "$INSTRUMENT_EXIT" ]; then
            echo "::error::pluginval (instrument) did not publish an exit code"
            FAILED=1
          elif [ "$INSTRUMENT_EXIT" != "0" ]; then
            echo "::error::pluginval (instrument) failed with exit code $INSTRUMENT_EXIT"
            FAILED=1
          fi
          exit $FAILED
